# Redis Sentinel Configuration for High Availability
# This configuration file sets up Sentinel for monitoring and failover

# Port on which Sentinel listens
port 26379

# Log level - one of: debug, verbose, notice, warning
loglevel notice

# The mymaster instance has servers, a quorum of 1, and 30000 ms notification delay
sentinel monitor mymaster redis 6379 1
sentinel down-after-milliseconds mymaster 5000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 10000

# By default Sentinel includes no other configuration files, but you can include
# external config files with this directive
